# Formal driver name
name: VEGA VEGAPULS Air LoRaWAN codec
# Simple description of the driver functionalities
description: Decoder for VEGA VEGAPULS Air 41 and VEGAPULS Air 42 LoRaWAN uplinks.
# Mandatory - id of the company that developed the driver
producerId: actility
# Email of the developer
developerEmail: tpx-iot-flow@actility.com
# Needed for linking the model with a specific driver -> must be the same one used in model.yaml
protocolId: vega:vegapuls-air:1
# This is to specify the type of functions signature used in this driver.
signature: actility
