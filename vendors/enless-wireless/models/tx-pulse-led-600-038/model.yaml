# Commercial name of the model 
name: "600-038 - Pulse sensor for Electric Meter - LED optical reader"
# Functional description of the product. Maximum 500 characters. 
description: "This LoRaWAN pulse meter transmitter works by reading and transcribing pulsed LED flashes and is therefore compatible with electric meters with light diodes.This radio transmitter allows the remote reading of the electric consumption data from the meter to which it is connected without any manual intervention. In other words, this transmitter will quickly and economically transform your electric meter into a smart meter. hanks to its LED optical reading head, the connection to the meter is si..."
