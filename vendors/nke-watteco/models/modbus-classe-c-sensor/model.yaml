# Commercial name of the model 
name: "Modbus classe C - Modbus Interface"
# Functional description of the product. Maximum 500 characters. 
description: "The ModBus/LoRaWAN® Bridge collects data from any ModBus RTU existing equipment and connects these devices to a public or private LoRaWAN® network. The Bridge has the capability to change the behaviour of the ModBus device by writing into its registers."
# Logo of the device
