# Functional description of the product. Maximum 500 characters. 
description: "The TEKTELIC AURA [Smart AC Switch] is an ideal solution for Smart Home and Office automation. The switch gives users the ability to monitor and report on energy consumption and utilization including line voltage reporting as well as load, current, power and power factor reports. This device is designed to wirelessly communnicate via LoRaWAN® which allows for seamless integration into your network. Users will experience cost savings from improved power consumption practices and enhanced home ..."
