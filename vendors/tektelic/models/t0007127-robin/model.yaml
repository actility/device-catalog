# Commercial name of the model 
name: "ROBIN Outdoor Panic Button"
# Functional description of the product. Maximum 500 characters. 
description: "TEKTELIC’s ROBIN is a compact, mobile, wireless outdoor BLE panic button that transmits an emergency signal from any location. When triggered, this device instantly sends an SOS message containing location details to designated support staff or security personnel to ensure a rapid response in the event of a panic situation."
# Logo of the device
