# Commercial name of the model 
name: "ORCA Industrial GPS Asset Tracker"
# Functional description of the product. Maximum 500 characters. 
description: "The TEKTELIC ORCA [Industrial GPS Asset Tracker] is an ideal solution for geolocalizing your assets in the field. This device provides GPS enabled near real-time satellite location tracking with LoRaWAN®. The rugged IP67 design allows for operation in diverse deployment environments, with an operable temperature range of -40°C to +85°C and an optional BLE integration. The device contains 2x D Cell batteries for optimal battery life of up to 8-10 years. The unit is equipped with an acceleromet..."
# Logo of the device
logo: industrial-gps-asset-tracker.png
# Product name & Version
product:
    name: TEKTELIC/T0006129-ORCA
    version: 1
# ID(s) of the profile that defines the LoRaWAN characteristics of this model.
deviceProfileIds: 
    - id: tektelic_RFGroup1_1.0.2b_classA
    - id: tektelic_RFGroup1_1.0.2b_classC
    - id: tektelic_RFGroup2_1.0.2b_classA
    - id: tektelic_RFGroup2_1.0.2b_classC
    - id: tektelic_RFGroup4_1.0.2b_classA
    - id: tektelic_RFGroup4_1.0.2b_classC
 
