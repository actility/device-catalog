  - concentration:ug/m3
  - concentration:ug/m3
  - concentration:ug/m3
  - concentration:ppb
  - concentration:ppb
  - concentration:ppb
  - concentration:ppm
  - sound:dB

examples:
  inbiot:inbiot-decoder:1:
    - Device Information Uplink (Firmware, MAC, Modbus Config)
    - Device Configuration Uplink (Tx Period, LED, ADR)
    - WELL Telemetry Uplink (Temp, Hum, CO2, PMs, CH2O, O3, NO2, CO)
    - WELL Active Sensor Readings
    - Downlink: Enable LED indicator
    - Downlink: Set transmission period to 10 min and disable LED
    - Downlink: Invoke software reset
    - Downlink: Configure overarching parameters (Period, LED, ADR, TX Power)

