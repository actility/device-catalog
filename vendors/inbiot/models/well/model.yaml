name: MICA WELL - Indoor Air Quality Sensor
description: MICA WELL is the most comprehensive indoor air quality monitoring device in the MICA range, measuring temperature, relative humidity, CO2, TVOC, PM1.0, PM2.5, PM4.0, PM10, formaldehyde, ozone, NO2 and CO, combined with thermohygrometric comfort, ventilation efficiency, resistance to mold growth, virus spread resistance and indoor air quality indicators, with optional noise monitoring and full compatibility with Modbus and BACnet for professional BMS and certification-driven projects.
logo: well.png
