name: MICA - Indoor Air Quality Sensor
description: MICA is a smart indoor air quality monitor that measures temperature, relative humidity, CO2, TVOC, PM2.5 and PM10, and delivers advanced virtual indicators including thermohygrometric comfort, ventilation efficiency, resistance to mold growth, virus spread resistance and overall indoor air quality, with optional noise monitoring and native BMS integration via Modbus and BACnet.
logo: mica.png
deviceProfileIds:
  - id: inbiot_RFGroup1_1.0.4a_classA
    lorawanDeviceProfileID: ''
  - id: inbiot_RFGroup2_1.0.4a_classA
    lorawanDeviceProfileID: ''

maxTxPower: 
minTxPower: 
maxTxEIRP: 
minTxEIRP: 
motionIndicator: RANDOM

LoRaWANCertified: true
