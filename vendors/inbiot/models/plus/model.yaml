name: MICA PLUS - Indoor Air Quality Sensor
description: MICA Plus is an advanced indoor air quality monitor that measures temperature, relative humidity, CO2, TVOC, PM1.0, PM2.5, PM4.0, PM10 and formaldehyde, and provides thermohygrometric comfort, ventilation efficiency, resistance to mold growth, virus spread resistance and indoor air quality indicators, with optional noise monitoring and seamless integration with BMS systems through Modbus and BACnet.
logo: plus.png
deviceProfileIds:
  - id: inbiot_RFGroup1_1.0.4a_classA
    lorawanDeviceProfileID: ''
  - id: inbiot_RFGroup2_1.0.4a_classA
    lorawanDeviceProfileID: ''

maxTxPower: 
minTxPower: 
maxTxEIRP: 
minTxEIRP: 
motionIndicator: RANDOM

LoRaWANCertified: true
modelId: inbiot:plus:1
protocolId:
  - inbiot:inbiot-decoder:1

sensors:
  - temperature:Cel
  - humidity:%RH
  - co2:ppm
  - tvoc:ppb
  - pm1_0:ug/m3
  - pm2_5:ug/m3
  - pm4:ug/m3
  - pm10:ug/m3
  - ch2o:ppb
  - sound:dB

examples:
  inbiot:inbiot-decoder:1:
    - Device Information Uplink (Firmware, MAC, Modbus Config)
    - Device Configuration Uplink (Tx Period, LED, ADR)
    - PLUS Telemetry Uplink (Temp, Hum, CO2, PMs, CH2O)
    - Downlink: Enable LED indicator
    - Downlink: Set transmission period to 10 min and disable LED
    - Downlink: Invoke software reset
    - Downlink: Configure overarching parameters (Period, LED, ADR, TX Power)

LoRaWANRelay:
  canOperateAsARelay: false
  defaultRelayActivation: false
