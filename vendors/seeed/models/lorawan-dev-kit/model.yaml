# Commercial name of the model 
name: "LoRaWAN Dev Kit"
# Functional description of the product. Maximum 500 characters. 
description: "The kit includes a Wio Terminal master controller with WIFI/BLE and display, as well as carefully selected Grove - LoRa-E5, Grove - VOC and eCO2 Gas Sensor SGP30, Grove - Soil Moisture Sensor, Grove - Temp&Humi Sensor (SHT40), and Grove - Vision AI Module. Humi Sensor (SHT40), and Grove - Vision AI Module. This kit is a perfect combination of LoRa and Edge AI, which allows software engineers to quickly deploy their first LoRaWAN projects through plug-and-play connectivity."
# Logo of the device
logo: lorawan-dev-kit.png
# Product name & Version
product:
    name: SEEED/LORAWAN-DEV-KIT
    version: 1
# ID(s) of the profile that defines the LoRaWAN characteristics of this model.
deviceProfileIds: 
    - id: seeed_RFGroup1_1.0.3a_classA
    - id: seeed_RFGroup2_1.0.3a_classA
 
