# Commercial name of the model 
name: "R718VA - Wireless Capacitive Proximity Sensor"
# Functional description of the product. Maximum 500 characters. 
description: "R718VA is a device to detect the status of toilet water, hand sanitizer level, presence or absence of tissue. This device is connected with a non-contact capacitive sensor can be mounted to the exterior of the container, without direct contact with the object to be detected, which may detect the current water level of positions mounted, or the presence or absence of liquid soap or toilet paper; the detected data is transmitted to other devices through the wireless network. It uses the SX1276 ..."
# Logo of the device
logo: photos/r718va.jpg
# Product name & Version
product:
    name: NETVOX/R718VA
    version: 11
# ID(s) of the profile that defines the LoRaWAN characteristics of this model.
deviceProfileIds: 
    - id: netvox_RFGroup1_1.0.2b_classA
    - id: netvox_RFGroup4_1.0.2b_classA
    - id: netvox_RFGroup2_1.0.2b_classA
 
