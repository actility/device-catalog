# Commercial name of the model 
name: HD67D03-B2
# Functional description of the product. Maximum 500 characters. 
description: "The ADFweb HD67D03-B2 is a LoRaWAN to Modbus TCP/IP gateway that enables integration of Modbus TCP/IP devices into LoRaWAN networks. It supports Class C continuous listening mode for low-latency downstream commands."
# Logo of the device
logo: adfweb-hd67d03-b2.png
# Product name & Version
product:
    name: HD67D03-B2
    version: 1
# ID(s) of the profile that defines the LoRaWAN characteristics of this model.
# id: as defined under /profiles.
# lorawanDeviceProfileID: as defined by LoRa Alliance in https://lora-alliance.org/wp-content/uploads/2020/10/LoRa_Alliance_Vendor_ID_for_QR_Code_02142022.pdf.
# The lorawanDeviceProfileID consists of 8 upper-case hexadecimal characters, 4 characters for VendorID + 4 characters for VendorProfileID.
deviceProfileIds:
    - id: adfweb_RFGroup1_1.0.2revB_classC

# You may optionally customize any of the following settings to override the generic value set in LoRaWAN device profiles associated with your model.
# Maximum device TX Conducted output power in dBm.
maxTxPower: 14
# Minimum device TX Conducted output power in dBm.
minTxPower:
# Maximum device TX Radiated output power in dBm.
maxTxEIRP:
# Minimum device TX Radiated output power in dBm.
minTxEIRP:
# Typical mobility profile of the device.
motionIndicator: near_static

# Is your device certified by the LoRa Alliance? Possible values: true, false.
LoRaWANCertified:
# Always mandatory: `<vendorId>:<modelName>:<modelVersion>` (You should have only one per model)
# Format: `<8 characters max>:<16 characters max>:<digits only>`
modelId: adfweb:hd67d03-b2:1
# <vendorId>:<protocolName>:<protocolVersion> Needed for linking the model with a specific driver
protocolId:
# DataSheet URL (optional)
specificationURL: https://www.adfweb.com/Home/products/LoRaWAN_ModbusTCP.asp?frompg=nav36_3
# User Guide URL (optional)
userGuideURL: https://www.adfweb.com/Home/products/LoRaWAN_ModbusTCP.asp?frompg=nav36_3
